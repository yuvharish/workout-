<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Workout Program</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222222;
    --border: #2a2a2a;
    --accent: #c8f75e;
    --accent2: #5ec8f7;
    --accent3: #f75e8f;
    --text: #f0ede6;
    --muted: #888;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    padding: 3rem 2rem 2rem;
    max-width: 900px;
    margin: 0 auto;
    border-bottom: 1px solid var(--border);
  }
  .header-tag {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    font-weight: 500;
  }
  h1 {
    font-family: var(--font-head);
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 1rem;
  }
  h1 span { color: var(--accent); }
  .header-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 1.25rem;
  }
  .meta-pill {
    font-size: 11px;
    padding: 4px 12px;
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* WEEK STRIP */
  .week-strip {
    max-width: 900px;
    margin: 0 auto;
    padding: 1.5rem 2rem 0;
    display: grid;
    grid-template-columns: repeat(7, minmax(0,1fr));
    gap: 6px;
  }
  .day-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 4px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    color: var(--text);
    font-family: var(--font-mono);
  }
  .day-btn:hover { border-color: #444; background: var(--surface2); }
  .day-btn.active { border-color: var(--accent); background: var(--surface2); }
  .day-btn.active .day-short { color: var(--accent); }
  .day-short { font-size: 11px; font-weight: 500; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.05em; }
  .day-icon { font-size: 18px; margin-bottom: 4px; display: block; }
  .day-type { font-size: 9px; color: var(--muted); line-height: 1.3; }

  /* MAIN CONTENT */
  .content {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 2rem 4rem;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    margin: 1.5rem 0 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 8px 16px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 0.05em;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* PANEL */
  .panel { display: none; }
  .panel.active { display: block; }

  /* DAY HEADER */
  .day-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 1.25rem;
  }
  .day-title {
    font-family: var(--font-head);
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .day-badge {
    font-size: 10px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 999px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
    margin-top: 4px;
  }
  .badge-upper { background: #1e1a3a; color: #9d8ff7; border: 1px solid #3c3270; }
  .badge-legs { background: #3a1a1a; color: #f7756a; border: 1px solid #6b2e2e; }
  .badge-badminton { background: #1a2e1a; color: #7bcf7b; border: 1px solid #2e5a2e; }
  .badge-core { background: #2e2500; color: #d4a830; border: 1px solid #5c4a00; }
  .badge-athletic { background: #0a2035; color: #5ec8f7; border: 1px solid #1a4a6e; }
  .badge-rest { background: #1a1a1a; color: var(--muted); border: 1px solid var(--border); }

  /* DURATION BAR */
  .dur-wrap { margin-bottom: 1.25rem; }
  .dur-bar { display: flex; gap: 2px; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 6px; }
  .dur-seg { height: 100%; }
  .dur-legend { display: flex; gap: 14px; flex-wrap: wrap; }
  .dur-label { font-size: 10px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
  .dur-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  /* WARM/COOL */
  .wc-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.65;
    margin-bottom: 1rem;
  }
  .wc-block strong { color: var(--accent); font-weight: 500; }

  /* SECTION */
  .sec-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin: 1.4rem 0 0.6rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sec-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* EXERCISE ROWS */
  .ex-row {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }
  .ex-row:last-child { border-bottom: none; }
  .ex-n {
    min-width: 24px;
    height: 24px;
    border-radius: 4px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 500;
    color: var(--muted);
    flex-shrink: 0;
    margin-top: 1px;
  }
  .ex-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .ex-detail { font-size: 12px; color: var(--muted); line-height: 1.55; }
  .ex-prog {
    display: inline-block;
    margin-top: 5px;
    font-size: 11px;
    color: var(--accent2);
    background: #0a1e2e;
    border: 1px solid #1a3a52;
    padding: 2px 8px;
    border-radius: 4px;
  }

  /* PROGRESSION */
  .prog-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 10px;
  }
  .prog-phase {
    font-family: var(--font-head);
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .prog-text { font-size: 13px; color: var(--muted); line-height: 1.7; }

  /* NUTRITION */
  .nut-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
  .nut-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .nut-title { font-size: 10px; font-weight: 500; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
  .nut-val { font-size: 13px; color: var(--muted); line-height: 1.6; }

  /* INFO BOX */
  .info-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent2);
    border-radius: 0 8px 8px 0;
    padding: 12px 16px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.65;
    margin-top: 1rem;
  }
  .info-box strong { color: var(--text); font-weight: 500; }

  /* EDIT NOTE */
  .edit-note {
    max-width: 900px;
    margin: 0 auto 0;
    padding: 0 2rem 1rem;
  }
  .edit-note p {
    font-size: 11px;
    color: #444;
    text-align: center;
    letter-spacing: 0.04em;
  }
  .edit-note a { color: #555; }

  @media (max-width: 600px) {
    header, .content, .week-strip, .edit-note { padding-left: 1rem; padding-right: 1rem; }
    .day-type { display: none; }
    .day-icon { font-size: 14px; }
    .nut-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

<header>
  <div class="header-tag">// 5-day training program</div>

  <div class="panel" id="panel-nutrition">

  </div>
</div>

</div>

  {phase:"Weeks 3–4 — Volume build", text:"Add 1 extra set to major compounds. Increase reps by 2–3 where form holds. Pull-ups: 4×10. Begin chest-to-bar attempts. Core holds extend to 40 sec. Badminton intensity increases — longer sets, faster feeds."},
  {phase:"Weeks 5–6 — Intensity spike", text:"Explosive pull-ups and first banded muscle-up attempts. Squat and deadlift increase 5–10 kg. Add weighted dips (+5 kg). HIIT: 40 sec on / 20 sec off. Hanging leg raises: full straight leg, not bent. Footwork: cut rest by 10 sec."},
  {phase:"Weeks 7–8 — Peak & deload", text:"Attempt 1–2 unassisted muscle-ups. Test new 5-rep maxes on squat, deadlift, bench. HIIT at maximum effort. Footwork: reduce all rest by 30%. In week 8: drop volume by 20% across all sessions (deload). Record and celebrate measurable gains."},
];

const nutritionData = [
  {title:"Protein target", val:"1.8–2.2 g per kg bodyweight daily. Eggs, chicken, fish, Greek yoghurt, cottage cheese, legumes."},
  {title:"Calorie deficit", val:"200–400 kcal below maintenance. Avoid steep deficits — they impair muscle gain and slow recovery."},
  {title:"Carb timing", val:"Higher carbs before and after training. Reduce on rest days. Oats, rice, sweet potato are ideal."},
  {title:"Dietary fats", val:"0.8–1 g per kg bodyweight. Avocado, olive oil, nuts, fatty fish. Essential for hormones and recovery."},
  {title:"Hydration", val:"3–4 litres per day. Add electrolytes after badminton sessions. Dehydration tanks performance fast."},
  {title:"Abs visibility", val:"Abs show at ~12–15% body fat for most men. Consistent diet — not crash dieting — is the driver, not ab exercises alone."},
  {title:"Pre-workout meal", val:"1–2 hrs before: complex carbs + protein. Oats + protein powder, or rice + chicken. Avoid heavy fats close to training."},
  {title:"Post-workout window", val:"Within 60 min: 30–50 g protein + fast carbs. Protein shake + banana, or Greek yoghurt + berries."},
];

let selectedDay = 0;

function renderStrip() {
  document.getElementById('weekStrip').innerHTML = days.map((d,i)=>`
    <button class="day-btn ${i===selectedDay?'active':''}" onclick="selectDay(${i})">
      <div class="day-short">${d.short}</div>
      <span class="day-icon">${d.icon}</span>
      <div class="day-type">${d.type.split(' ').slice(0,2).join(' ')}</div>
    </button>
  `).join('');
}

function renderWorkout() {
  const d = days[selectedDay];
  const total = d.segs.reduce((a,s)=>a+s.m,0);
  let h = `
    <div class="day-header">
      <div class="day-title">${d.label}</div>
      <span class="day-badge ${d.badge}">${d.badgeLabel}</span>
    </div>
    <div class="dur-wrap">
      <div class="dur-bar">
        ${d.segs.map(s=>`<div class="dur-seg" style="width:${Math.round(s.m/total*100)}%;background:${s.c};border-radius:3px;"></div>`).join('')}
      </div>
      <div class="dur-legend">
        ${d.segs.map(s=>`<span class="dur-label"><span class="dur-dot" style="background:${s.c};"></span>${s.l} ${s.m} min</span>`).join('')}
      </div>
    </div>
    <div class="wc-block"><strong>Warm-up:</strong> ${d.warmup}</div>
  `;
  d.sections.forEach(sec=>{
    h += `<div class="sec-label">${sec.title}</div>`;
    sec.exs.forEach((ex,i)=>{
      h += `<div class="ex-row">
        <div class="ex-n">${i+1}</div>
        <div>
          <div class="ex-name">${ex.n}</div>
          <div class="ex-detail">${ex.d}</div>
          ${ex.p?`<div class="ex-prog">→ ${ex.p}</div>`:''}
        </div>
      </div>`;
    });
  });
  h += `<div class="sec-label" style="margin-top:1.4rem;">Cool-down</div>
    <div class="wc-block"><strong>Cool-down:</strong> ${ex => ex}${d.cooldown}</div>`;
  document.getElementById('workoutDetail').innerHTML = h.replace('${ex => ex}','');
}

function renderProgression() {
  document.getElementById('progDetail').innerHTML = progressionData.map(p=>`
    <div class="prog-card">
      <div class="prog-phase">${p.phase}</div>
      <div class="prog-text">${p.text}</div>
    </div>
  `).join('');
}

function renderNutrition() {
  document.getElementById('nutDetail').innerHTML = `
    <p style="font-size:13px;color:var(--muted);margin-bottom:1rem;line-height:1.7;">Evidence-based guidelines for fat loss, muscle retention, and abs visibility. Adjust quantities to your bodyweight.</p>
    <div class="nut-grid">
      ${nutritionData.map(n=>`
        <div class="nut-card">
          <div class="nut-title">${n.title}</div>
          <div class="nut-val">${n.val}</div>
        </div>
      `).join('')}
    </div>
    <div class="info-box" style="margin-top:1.25rem;">
      <strong>Key principle:</strong> You cannot out-train a poor diet for abs visibility. The training builds the muscle; the calorie deficit reveals it. Both have to run simultaneously, consistently, over 8–16 weeks.
    </div>
  `;
}

function selectDay(i) {
  selectedDay = i;
  renderStrip();
  const activePanel = document.querySelector('.panel.active').id.replace('panel-','');
  if(activePanel==='workout') renderWorkout();
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
  if(tab==='workout') renderWorkout();
  else if(tab==='progression') renderProgression();
  else if(tab==='nutrition') renderNutrition();
}

renderStrip();
renderWorkout();
</script>
</body>
</html>
