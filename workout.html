<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Workout Program</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f; --surface: #181818; --surface2: #222222; --border: #2a2a2a;
    --accent: #c8f75e; --accent2: #5ec8f7; --accent3: #f75e8f;
    --text: #f0ede6; --muted: #888;
    --font-head: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-mono); font-size: 14px; line-height: 1.6; min-height: 100vh; }

  header { padding: 2.5rem 2rem 1.5rem; max-width: 900px; margin: 0 auto; border-bottom: 1px solid var(--border); }
  .header-tag { font-size: 11px; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 0.6rem; font-weight: 500; }
  h1 { font-family: var(--font-head); font-size: clamp(1.8rem, 4vw, 3rem); font-weight: 800; line-height: 1.05; letter-spacing: -0.02em; margin-bottom: 0.75rem; }
  h1 span { color: var(--accent); }
  .header-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 1rem; }
  .meta-pill { font-size: 11px; padding: 3px 10px; border: 1px solid var(--border); border-radius: 999px; color: var(--muted); letter-spacing: 0.05em; }

  .streak-bar { max-width: 900px; margin: 0 auto; padding: 1rem 2rem; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .streak-item { display: flex; align-items: center; gap: 8px; }
  .streak-num { font-family: var(--font-head); font-size: 1.6rem; font-weight: 800; color: var(--accent); line-height: 1; }
  .streak-lbl { font-size: 11px; color: var(--muted); line-height: 1.3; }
  .streak-sep { width: 1px; height: 32px; background: var(--border); }

  .week-strip { max-width: 900px; margin: 0 auto; padding: 1.25rem 2rem 0; display: grid; grid-template-columns: repeat(7, minmax(0,1fr)); gap: 6px; }
  .day-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 4px 6px; text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s; color: var(--text); font-family: var(--font-mono); position: relative; }
  .day-btn:hover { border-color: #444; background: var(--surface2); }
  .day-btn.active { border-color: var(--accent); background: var(--surface2); }
  .day-btn.active .day-short { color: var(--accent); }
  .day-btn.done { border-color: #2a4a0a; background: #0d1a05; }
  .day-btn.done .day-short { color: var(--accent); }
  .done-dot { position: absolute; top: 5px; right: 5px; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: none; }
  .day-btn.done .done-dot { display: block; }
  .day-short { font-size: 11px; font-weight: 500; color: var(--muted); margin-bottom: 3px; letter-spacing: 0.05em; }
  .day-icon { font-size: 16px; margin-bottom: 3px; display: block; }
  .day-type { font-size: 9px; color: var(--muted); line-height: 1.3; }

  .content { max-width: 900px; margin: 0 auto; padding: 0 2rem 4rem; }

  .tabs { display: flex; margin: 1.25rem 0; border-bottom: 1px solid var(--border); overflow-x: auto; }
  .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; padding: 8px 14px; font-family: var(--font-mono); font-size: 12px; color: var(--muted); cursor: pointer; letter-spacing: 0.05em; margin-bottom: -1px; transition: color 0.15s, border-color 0.15s; white-space: nowrap; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .panel { display: none; }
  .panel.active { display: block; }

  .day-header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 1rem; }
  .day-title { font-family: var(--font-head); font-size: clamp(1.3rem, 3vw, 1.8rem); font-weight: 700; letter-spacing: -0.02em; }
  .day-badge { font-size: 10px; font-weight: 500; padding: 4px 12px; border-radius: 999px; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; margin-top: 4px; }
  .badge-upper { background: #1e1a3a; color: #9d8ff7; border: 1px solid #3c3270; }
  .badge-legs { background: #3a1a1a; color: #f7756a; border: 1px solid #6b2e2e; }
  .badge-badminton { background: #1a2e1a; color: #7bcf7b; border: 1px solid #2e5a2e; }
  .badge-core { background: #2e2500; color: #d4a830; border: 1px solid #5c4a00; }
  .badge-athletic { background: #0a2035; color: #5ec8f7; border: 1px solid #1a4a6e; }
  .badge-rest { background: #1a1a1a; color: var(--muted); border: 1px solid var(--border); }

  .done-btn { display: flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-family: var(--font-mono); font-size: 12px; color: var(--muted); cursor: pointer; transition: all 0.15s; margin-bottom: 1rem; width: 100%; justify-content: center; letter-spacing: 0.04em; }
  .done-btn:hover { border-color: var(--accent); color: var(--accent); }
  .done-btn.is-done { background: #0d1a05; border-color: var(--accent); color: var(--accent); }
  .done-chk { width: 16px; height: 16px; border-radius: 4px; border: 1px solid currentColor; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }

  .dur-wrap { margin-bottom: 1rem; }
  .dur-bar { display: flex; gap: 2px; height: 6px; border-radius: 3px; overflow: hidden; margin-bottom: 5px; }
  .dur-seg { height: 100%; }
  .dur-legend { display: flex; gap: 12px; flex-wrap: wrap; }
  .dur-label { font-size: 10px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
  .dur-dot { width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0; }

  .wc-block { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--muted); line-height: 1.65; margin-bottom: 0.75rem; }
  .wc-block strong { color: var(--accent); font-weight: 500; }

  .sec-label { font-size: 10px; font-weight: 500; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin: 1.2rem 0 0.5rem; display: flex; align-items: center; gap: 8px; }
  .sec-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .ex-row { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
  .ex-row:last-child { border-bottom: none; }
  .ex-n { min-width: 22px; height: 22px; border-radius: 4px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; color: var(--muted); flex-shrink: 0; margin-top: 2px; }
  .ex-body { flex: 1; min-width: 0; }
  .ex-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .ex-detail { font-size: 12px; color: var(--muted); line-height: 1.55; }
  .ex-prog { display: inline-block; margin-top: 4px; font-size: 11px; color: var(--accent2); background: #0a1e2e; border: 1px solid #1a3a52; padding: 2px 7px; border-radius: 4px; }
  .ex-links { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .yt-link { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: #ff7070; background: #200a0a; border: 1px solid #3a1414; padding: 3px 8px; border-radius: 4px; text-decoration: none; transition: background 0.15s; }
  .yt-link:hover { background: #2e0f0f; border-color: #5a2020; }
  .yt-icon { width: 10px; height: 10px; fill: #ff7070; flex-shrink: 0; }

  .notes-area { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-family: var(--font-mono); font-size: 12px; color: var(--text); resize: vertical; min-height: 72px; margin-top: 0.5rem; }
  .notes-area:focus { outline: none; border-color: #444; }
  .notes-area::placeholder { color: #444; }
  .notes-save { margin-top: 6px; padding: 6px 16px; background: none; border: 1px solid var(--border); border-radius: 6px; font-family: var(--font-mono); font-size: 11px; color: var(--muted); cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em; }
  .notes-save:hover { border-color: var(--accent); color: var(--accent); }
  .notes-saved-msg { color: var(--accent); font-size: 11px; margin-left: 10px; opacity: 0; transition: opacity 0.3s; }

  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .cal-nav { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 5px 14px; font-family: var(--font-mono); font-size: 13px; color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .cal-nav:hover { border-color: #444; color: var(--text); }
  .cal-month-lbl { font-family: var(--font-head); font-size: 1.1rem; font-weight: 700; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, minmax(0,1fr)); gap: 4px; }
  .cal-dow { font-size: 10px; color: var(--muted); text-align: center; padding: 4px 0 8px; letter-spacing: 0.05em; }
  .cal-day { aspect-ratio: 1; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; color: var(--muted); gap: 2px; }
  .cal-day.empty { background: none; border-color: transparent; }
  .cal-day.today { border-color: #555; color: var(--text); }
  .cal-day.has-workout { color: var(--muted); }
  .cal-day.completed { background: #0d1a05; border-color: #2a4a0a; color: var(--accent); }
  .cal-day-num { font-size: 12px; line-height: 1; }
  .cal-day-dot { width: 4px; height: 4px; border-radius: 50%; }
  .cal-day.completed .cal-day-dot { background: var(--accent); }
  .cal-day.has-workout:not(.completed) .cal-day-dot { background: #3a3a3a; }
  .cal-legend { display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap; }
  .cal-leg-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
  .cal-leg-dot { width: 10px; height: 10px; border-radius: 3px; border: 1px solid; }
  .cal-stats { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 8px; margin-bottom: 1.25rem; }
  .cal-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; }
  .cal-stat-n { font-family: var(--font-head); font-size: 1.8rem; font-weight: 800; color: var(--accent); line-height: 1; margin-bottom: 4px; }
  .cal-stat-l { font-size: 10px; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }
  .cal-log-title { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin: 1.2rem 0 0.6rem; display: flex; align-items: center; gap: 8px; }
  .cal-log-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .log-entry { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .log-entry:last-child { border-bottom: none; }
  .log-date { color: var(--muted); font-size: 11px; min-width: 95px; flex-shrink: 0; }
  .log-day { color: var(--text); flex: 1; font-size: 13px; }
  .log-note { font-size: 11px; color: var(--muted); font-style: italic; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .log-del { background: none; border: none; color: #3a3a3a; cursor: pointer; font-size: 13px; padding: 0 4px; transition: color 0.15s; flex-shrink: 0; }
  .log-del:hover { color: var(--accent3); }
  .empty-cal { margin-top: 1rem; font-size: 13px; color: var(--muted); }

  .prog-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
  .prog-phase { font-family: var(--font-head); font-size: 14px; font-weight: 600; color: var(--accent); margin-bottom: 5px; }
  .prog-text { font-size: 13px; color: var(--muted); line-height: 1.7; }

  .nut-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .nut-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
  .nut-title { font-size: 10px; font-weight: 500; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 5px; }
  .nut-val { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .info-box { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent2); border-radius: 0 8px 8px 0; padding: 10px 14px; font-size: 12px; color: var(--muted); line-height: 1.65; margin-top: 1rem; }
  .info-box strong { color: var(--text); font-weight: 500; }

  .edit-note { max-width: 900px; margin: 0 auto; padding: 0 2rem 1.5rem; }
  .edit-note p { font-size: 11px; color: #3a3a3a; text-align: center; }
  .edit-note a { color: #4a4a4a; }

  @media (max-width: 600px) {
    header, .content, .week-strip, .streak-bar, .edit-note { padding-left: 1rem; padding-right: 1rem; }
    .day-type { display: none; }
    .nut-grid { grid-template-columns: 1fr 1fr; }
    .log-note { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-tag">// 5-day training program</div>
  <h1>Build.<br><span>Move. Dominate.</span></h1>
  <div class="header-meta">
    <span class="meta-pill">Age 36</span>
    <span class="meta-pill">Strength + Calisthenics + Badminton</span>
    <span class="meta-pill">60–75 min sessions</span>
  </div>
</header>

<div class="streak-bar" id="streakBar"></div>
<div class="week-strip" id="weekStrip"></div>

<div class="content">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('workout',this)">Workout</button>
    <button class="tab-btn" onclick="switchTab('calendar',this)">Calendar</button>
    <button class="tab-btn" onclick="switchTab('progression',this)">4–8 week plan</button>
    <button class="tab-btn" onclick="switchTab('nutrition',this)">Nutrition</button>
  </div>
  <div class="panel active" id="panel-workout"><div id="workoutDetail"></div></div>
  <div class="panel" id="panel-calendar"><div id="calDetail"></div></div>
  <div class="panel" id="panel-progression"><div id="progDetail"></div></div>
  <div class="panel" id="panel-nutrition"><div id="nutDetail"></div></div>
</div>

<div class="edit-note"><p>Hosted on <a href="https://pages.github.com" target="_blank">GitHub Pages</a> — edit <code>workout.html</code> to update any exercise, set, or rep.</p></div>

<script>
const days = [
  {
    short:"Mon", label:"Monday", icon:"💪", type:"Upper + Muscle-up",
    badge:"badge-upper", badgeLabel:"Upper body", duration:"70 min",

    sections:[
      {title:"Muscle-up progression", exs:[
        {n:"Dead hang scapular pull-ups",d:"3 sets × 10 reps — full hang, depress scapulae only",p:"Wk 5+: add 2–3 slow eccentric pull-ups after each set",yt:[{l:"Scapular pull-ups",u:"https://www.youtube.com/results?search_query=scapular+pull+ups+tutorial"},{l:"Why they matter",u:"https://www.youtube.com/results?search_query=scapular+retraction+bar+calisthenics"}]},
        {n:"Explosive pull-ups (chin-up grip)",d:"4 sets × 6 reps — pull as explosively as possible to chest height",p:"Wk 5+: chest-to-bar; Wk 7+: muscle-up transition",yt:[{l:"Explosive pull-up form",u:"https://www.youtube.com/results?search_query=explosive+pull+up+tutorial"},{l:"Chest-to-bar progression",u:"https://www.youtube.com/results?search_query=chest+to+bar+pull+up+progression"}]},
        {n:"Banded muscle-up transitions",d:"3 sets × 5 reps — resistance band under hips at the bar",p:"Wk 5+: reduce band tension; Wk 7+: attempt unassisted",yt:[{l:"Muscle-up tutorial",u:"https://www.youtube.com/results?search_query=muscle+up+tutorial+beginner"},{l:"Banded muscle-up drill",u:"https://www.youtube.com/results?search_query=banded+muscle+up+progression+drill"}]},

      ]},
    ]

  {

        {n:"Copenhagen plank",d:"3 sets × 20–30 sec each side — groin and adductor strength",p:"Wk 5+: add 10 hip dips",yt:[{l:"Copenhagen plank",u:"https://www.youtube.com/results?search_query=copenhagen+plank+tutorial"}]},
      ]},
    ]
  },
  {

/* ─── STORAGE ─── */
function getLog(){try{return JSON.parse(localStorage.getItem('wklog')||'[]');}catch(e){return[];}}
function setLog(l){try{localStorage.setItem('wklog',JSON.stringify(l));}catch(e){}}
function getNotes(k){try{return localStorage.getItem('wknote_'+k)||'';}catch(e){return '';}}
function setNotes(k,v){try{localStorage.setItem('wknote_'+k,v);}catch(e){}}
function todayStr(){return new Date().toISOString().slice(0,10);}
function isDone(idx){const t=todayStr();return getLog().some(e=>e.date===t&&e.dayIdx===idx);}

function toggleDone(idx){
  const t=todayStr(); let log=getLog();
  const i=log.findIndex(e=>e.date===t&&e.dayIdx===idx);
  if(i>=0){log.splice(i,1);}
  else{
    const noteEl=document.getElementById('notesArea');
    const notes=noteEl?noteEl.value:(getNotes(t+'_'+idx));
    if(notes) setNotes(t+'_'+idx,notes);
    log.unshift({date:t,dayIdx:idx,label:days[idx].label,notes:notes.slice(0,80)});
  }
  setLog(log);
}

function getStreak(){
  const log=getLog(); if(!log.length)return 0;
  const dates=[...new Set(log.map(e=>e.date))].sort().reverse();
  const today=new Date(todayStr()); let streak=0;
  for(let i=0;i<dates.length;i++){
    const diff=Math.round((today-new Date(dates[i]))/(864e5));
    if(diff===i||diff===i+1)streak++; else break;
  }
  return streak;
}
function getTotalSessions(){return getLog().length;}
function getThisWeekSessions(){
  const log=getLog(); const today=new Date(todayStr());
  const mon=new Date(today); mon.setDate(today.getDate()-((today.getDay()+6)%7));
  return log.filter(e=>new Date(e.date)>=mon).length;
}

/* ─── WORKOUT ─── */
function renderWorkout(){
  const d=days[selectedDay]; const total=d.segs.reduce((a,s)=>a+s.m,0);
  const done=isDone(selectedDay); const noteKey=todayStr()+'_'+selectedDay;
  const savedNote=getNotes(noteKey);
  const ytSVG=`<svg class="yt-icon" viewBox="0 0 24 24"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.6 15.6V8.4l6.3 3.6-6.3 3.6z"/></svg>`;
  let h=`
    <div class="day-header">
      <div class="day-title">${d.label}</div>
      <span class="day-badge ${d.badge}">${d.badgeLabel}</span>
    </div>
    <button class="done-btn ${done?'is-done':''}" onclick="markDone()">
      <span class="done-chk">${done?'✓':''}</span>
      ${done?"Session logged for today \u2014 tap to undo":"Mark today's session as done"}
    </button>
    <div class="dur-wrap">
      <div class="dur-bar">${d.segs.map(s=>`<div class="dur-seg" style="width:${Math.round(s.m/total*100)}%;background:${s.c};border-radius:3px;"></div>`).join('')}</div>
      <div class="dur-legend">${d.segs.map(s=>`<span class="dur-label"><span class="dur-dot" style="background:${s.c};"></span>${s.l} ${s.m} min</span>`).join('')}</div>
    </div>
    <div class="wc-block"><strong>Warm-up:</strong> ${d.warmup}</div>`;
  d.sections.forEach(sec=>{
    h+=`<div class="sec-label">${sec.title}</div>`;
    sec.exs.forEach((ex,i)=>{
      const links=ex.yt&&ex.yt.length?`<div class="ex-links">${ex.yt.map(y=>`<a class="yt-link" href="${y.u}" target="_blank" rel="noopener">${ytSVG}${y.l}</a>`).join('')}</div>`:'';
      h+=`<div class="ex-row"><div class="ex-n">${i+1}</div><div class="ex-body">
        <div class="ex-name">${ex.n}</div>
        <div class="ex-detail">${ex.d}</div>
        ${ex.p?`<div class="ex-prog">\u2192 ${ex.p}</div>`:''}
        ${links}
      </div></div>`;
    });
  });
  h+=`<div class="sec-label" style="margin-top:1.2rem;">Cool-down</div>
    <div class="wc-block"><strong>Cool-down:</strong> ${d.cooldown}</div>
    <div class="sec-label" style="margin-top:1.2rem;">Session notes</div>
    <textarea class="notes-area" id="notesArea" placeholder="Note your weights, reps, how it felt...">${savedNote}</textarea>
    <div style="display:flex;align-items:center;margin-top:6px;">
      <button class="notes-save" onclick="saveNotes()">Save notes</button>
      <span class="notes-saved-msg" id="notesSavedMsg">Saved!</span>
    </div>`;
  document.getElementById('workoutDetail').innerHTML=h;
}

function markDone(){
  const noteEl=document.getElementById('notesArea');
  if(noteEl&&noteEl.value) setNotes(todayStr()+'_'+selectedDay, noteEl.value);
  toggleDone(selectedDay);
  renderStrip(); renderStreakBar(); renderWorkout();
}

function saveNotes(){
  const el=document.getElementById('notesArea'); if(!el)return;
  setNotes(todayStr()+'_'+selectedDay, el.value);
  const msg=document.getElementById('notesSavedMsg');
  if(msg){msg.style.opacity='1'; setTimeout(()=>msg.style.opacity='0',1800);}
}

/* ─── CALENDAR ─── */
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth();

function renderCalendar(){
  const log=getLog(); const today=todayStr();
  const doneMap={}; log.forEach(e=>{if(!doneMap[e.date])doneMap[e.date]=[];doneMap[e.date].push(e);});
  const firstDow=new Date(calYear,calMonth,1).getDay();
  const dim=new Date(calYear,calMonth+1,0).getDate();
  const offset=(firstDow+6)%7;
  const monthName=new Date(calYear,calMonth,1).toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  const monthKey=`${calYear}-${String(calMonth+1).padStart(2,'0')}`;
  const monthLogs=log.filter(e=>e.date.startsWith(monthKey));

  let h=`
    <div class="cal-stats">
      <div class="cal-stat"><div class="cal-stat-n">${getStreak()}</div><div class="cal-stat-l">Day streak</div></div>
      <div class="cal-stat"><div class="cal-stat-n">${getThisWeekSessions()}</div><div class="cal-stat-l">This week</div></div>
      <div class="cal-stat"><div class="cal-stat-n">${getTotalSessions()}</div><div class="cal-stat-l">Total done</div></div>
    </div>
    <div class="cal-header">
      <button class="cal-nav" onclick="calNav(-1)">&#8592;</button>
      <div class="cal-month-lbl">${monthName}</div>
      <button class="cal-nav" onclick="calNav(1)">&#8594;</button>
    </div>
    <div class="cal-grid">
      ${['Mo','Tu','We','Th','Fr','Sa','Su'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      ${Array(offset).fill('<div class="cal-day empty"></div>').join('')}`;
  for(let day=1;day<=dim;day++){
    const ds=`${monthKey}-${String(day).padStart(2,'0')}`;
    const isToday=ds===today; const completed=!!doneMap[ds];
    const dow=(offset+day-1)%7; const isWorkDay=dow<5;
    h+=`<div class="cal-day ${isToday?'today':''} ${completed?'completed':''} ${isWorkDay&&!completed?'has-workout':''}" title="${completed?doneMap[ds].map(e=>e.label).join(', '):ds}">
      <div class="cal-day-num">${day}</div><div class="cal-day-dot"></div>
    </div>`;
  }
  h+=`</div>
    <div class="cal-legend">
      <span class="cal-leg-item"><span class="cal-leg-dot" style="background:#0d1a05;border-color:#2a4a0a;"></span>Completed</span>
      <span class="cal-leg-item"><span class="cal-leg-dot" style="background:var(--surface);border-color:#444;"></span>Scheduled</span>
      <span class="cal-leg-item"><span class="cal-leg-dot" style="background:var(--surface);border-color:var(--border);"></span>Rest day</span>
    </div>`;
  if(monthLogs.length){
    h+=`<div class="cal-log-title">Sessions this month</div>
      ${monthLogs.map(e=>`<div class="log-entry">
        <span class="log-date">${new Date(e.date+'T12:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}</span>
        <span class="log-day">${e.label}</span>
        ${e.notes?`<span class="log-note">"${e.notes.slice(0,40)}${e.notes.length>40?'\u2026':''}"</span>`:''}
        <button class="log-del" onclick="deleteLog('${e.date}',${e.dayIdx})" title="Remove">\u2715</button>
      </div>`).join('')}`;
  } else {
    h+=`<p class="empty-cal">No sessions logged this month yet. Mark workouts as done in the Workout tab.</p>`;
  }
  document.getElementById('calDetail').innerHTML=h;
}

function calNav(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;} if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}

function deleteLog(date,dayIdx){
  let log=getLog().filter(e=>!(e.date===date&&e.dayIdx===dayIdx));
  setLog(log); renderStreakBar(); renderStrip(); renderCalendar();
}

  selectedDay=i; renderStrip();
  const active=document.querySelector('.panel.active').id.replace('panel-','');

}
function switchTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active'); document.getElementById('panel-'+tab).classList.add('active');
  if(tab==='workout')renderWorkout();
  else if(tab==='calendar')renderCalendar();
  else if(tab==='progression')renderProgression();
  else if(tab==='nutrition')renderNutrition();
}
